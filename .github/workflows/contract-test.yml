name: API Contract Test

on:
  schedule:
    # Run every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - run: npm ci
      - run: npm run build
      
      - name: Run E2E Integration Script
        env:
          WHATSPIE_TOKEN: ${{ secrets.WHATSPIE_TOKEN }}
        run: node e2e-test.mjs
