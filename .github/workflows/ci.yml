name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - runtime: node
            version: '18.x'
          - runtime: node
            version: '20.x'
          - runtime: node
            version: '22.x'
          - runtime: bun
            version: 'latest'
          - runtime: deno
            version: 'v2.x'

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      if: matrix.runtime == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.version }}
        cache: 'npm'

    - name: Use Bun
      if: matrix.runtime == 'bun'
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: ${{ matrix.version }}

    - name: Use Deno
      if: matrix.runtime == 'deno'
      uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ matrix.version }}
        
    - run: npm ci
      if: matrix.runtime == 'node'
    - run: bun install
      if: matrix.runtime == 'bun'

    - run: npm run build
      if: matrix.runtime != 'deno'
      
    - run: npm run test
      if: matrix.runtime == 'node'
    - run: bun test
      if: matrix.runtime == 'bun'
    - run: deno run -A npm:vitest run
      if: matrix.runtime == 'deno'
